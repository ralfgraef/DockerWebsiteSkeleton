<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DockerFrog</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <h1>🐸 DOCKER FROG</h1>
    <div id="hud">
      <span>Score: <strong id="score">0</strong></span>
      <span>Level: <strong id="level">1</strong></span>
      <span>Lives: <strong id="lives">♥♥♥</strong></span>
      <span>Best: <strong id="hiscore">0</strong></span>
    </div>
    <canvas id="gameCanvas" width="800" height="700"></canvas>
    <div id="controls">
      <div class="ctrl-row">
        <button id="btn-up" aria-label="Up">▲</button>
      </div>
      <div class="ctrl-row">
        <button id="btn-left"  aria-label="Left">◀</button>
        <button id="btn-down"  aria-label="Down">▼</button>
        <button id="btn-right" aria-label="Right">▶</button>
      </div>
    </div>
    <p id="hint">Arrow keys or WASD to move &bull; ENTER to restart</p>
  </div>
  <script src="game.js"></script>
</body>
</html>
